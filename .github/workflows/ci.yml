# CI — the red/green gate on every PR (issue #33).
#
# The workspace has a PATH dependency `garust = { path = "../garust" }` (root Cargo.toml),
# so every Rust/wasm job checks this repo out into `AMillionPlateaus/` and clones
# `westerngazoo/garust` as a SIBLING `garust/` — matching `../garust`.
#
# If `westerngazoo/garust` is PRIVATE, add a fine-grained PAT (repo:read) or deploy key as
# the `GARUST_TOKEN` secret; the checkout below uses it when present. For a public garust
# the token is simply ignored.
name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref so the queue stays short (< ~10 min warm).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    name: Rust — fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout AMillionPlateaus
        uses: actions/checkout@v4
        with:
          path: AMillionPlateaus
      - name: Checkout garust (sibling path dep)
        uses: actions/checkout@v4
        with:
          repository: westerngazoo/garust
          path: garust
          token: ${{ secrets.GARUST_TOKEN || github.token }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: AMillionPlateaus
      - name: cargo fmt --check (app crates only — not the garust dependency)
        working-directory: AMillionPlateaus
        # `--all` pulls the sibling garust checkout into fmt scope and gates on the
        # dependency's own formatting, which this repo doesn't own. Scope to our
        # workspace members. clippy/test below stay `--workspace` (deps aren't linted).
        run: cargo fmt -p mp-graph -p mp-domain -p mp-reputation -p mp-identity -p mp-crdt -p mp-wasm -p mp-host -p mp-godot -- --check
      - name: cargo clippy -D warnings
        working-directory: AMillionPlateaus
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test --workspace
        working-directory: AMillionPlateaus
        run: cargo test --workspace

  web:
    name: Web — node --test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout AMillionPlateaus
        uses: actions/checkout@v4
        with:
          path: AMillionPlateaus
      - name: Setup Node (>= 20)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      # Plain ES modules — no package.json / npm install. Glob the suites directly.
      - name: node --test
        working-directory: AMillionPlateaus
        run: node --test apps/web/src/*.test.mjs

  wasm:
    name: wasm — wasm-pack build check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout AMillionPlateaus
        uses: actions/checkout@v4
        with:
          path: AMillionPlateaus
      - name: Checkout garust (sibling path dep)
        uses: actions/checkout@v4
        with:
          repository: westerngazoo/garust
          path: garust
          token: ${{ secrets.GARUST_TOKEN || github.token }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: AMillionPlateaus
      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest
      # Build-only check; pkg/ stays gitignored (never committed).
      - name: wasm-pack build crates/mp-wasm
        working-directory: AMillionPlateaus
        run: wasm-pack build crates/mp-wasm --target web --out-dir ../../apps/web/pkg

  smoke:
    # Does the REAL app boot in a REAL browser? Exists because three defects
    # shipped that node-only tests cannot see (a dangling import, a browser-only
    # fetch binding, an IndexedDB boot deadlock — #73/#75/#76): each one passed
    # `node --test` and still deployed a black screen. Headless Chrome is
    # preinstalled on the runner — still zero project dependencies.
    name: Smoke — app boots in headless Chrome
    runs-on: ubuntu-latest
    steps:
      - name: Checkout AMillionPlateaus
        uses: actions/checkout@v4
        with:
          path: AMillionPlateaus
      - name: Checkout garust (sibling path dep)
        uses: actions/checkout@v4
        with:
          repository: westerngazoo/garust
          path: garust
          token: ${{ secrets.GARUST_TOKEN || github.token }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: AMillionPlateaus
      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest
      - name: Build the wasm bundle
        working-directory: AMillionPlateaus
        run: wasm-pack build crates/mp-wasm --target web --out-dir ../../apps/web/pkg
      - name: Setup Node >= 22 (built-in WebSocket for the CDP smoke client)
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Boot the app in headless Chrome (CDP-poll the HUD until drawn)
        working-directory: AMillionPlateaus
        run: ./scripts/smoke.sh
