name: Godot

# CI for the immersive 3D client (apps/godot) and its native binding (crates/mp-godot).
#
#   * godot-headless-tests — runs the self-contained SceneTree test runner
#     (apps/godot/test/run_tests.gd). It quit()s with the failure count, so a
#     non-zero exit fails the job.
#
# Godot is installed with scripts/install-godot.sh (same script devs use locally),
# which fetches Godot_v4.4-stable_linux.x86_64 into tools/godot/Godot.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Keep only the latest run per branch/PR.
concurrency:
  group: godot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  godot-headless-tests:
    name: Godot headless tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The stock Godot linux build is dynamically linked; even in --headless mode
      # it needs these to load. unzip/curl back scripts/install-godot.sh.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            curl unzip libfontconfig1 libgl1

      # Reuse the repo's installer so CI and local dev stay in lockstep on the
      # exact Godot version. It no-ops if a godot binary is already on PATH.
      - name: Install Godot 4.4 (headless)
        run: |
          chmod +x scripts/install-godot.sh
          ./scripts/install-godot.sh

      # First headless launch imports resources; do it once up front so the test
      # run's output is just the test results. Import glitches must not fail CI.
      - name: Import project (warm-up)
        continue-on-error: true
        run: |
          ./tools/godot/Godot --headless --path apps/godot --import

      - name: Run headless tests
        run: |
          ./tools/godot/Godot --headless \
            --path apps/godot \
            --script res://test/run_tests.gd

  gdext-build:
    name: GDExtension build (Linux)
    runs-on: ubuntu-latest
    # The workspace pins garust as a path dep (`garust = { path = "../garust" }`
    # in Cargo.toml — a sibling of the repo root). CI has no access to that source
    # unless it is cloned. Until the garust source location is wired up as a repo
    # secret/variable (see GARUST_REPO below), keep this job non-blocking so it is
    # present and runnable but never red on a missing private dep.
    continue-on-error: true
    env:
      # Parameterized: set repo/org variables to point at the real garust source.
      #   Settings → Secrets and variables → Actions → Variables:
      #     GARUST_REPO  e.g. https://github.com/westerngazoo/garust  (or a git URL)
      #     GARUST_REF   e.g. main  (branch/tag/sha; defaults to main)
      # For a private repo, also add a token (e.g. GH_PAT secret) and swap the
      # clone step to authenticate. If GARUST_REPO is empty the job self-skips.
      GARUST_REPO: ${{ vars.GARUST_REPO }}
      GARUST_REF: ${{ vars.GARUST_REF || 'main' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Clone garust next to the repo root so the `../garust` path dep resolves.
      # $GITHUB_WORKSPACE is the checkout dir; its parent is where `../garust` lands.
      - name: Fetch garust (sibling path dependency)
        id: garust
        run: |
          if [ -z "${GARUST_REPO}" ]; then
            echo "GARUST_REPO is not set — skipping the gdext build."
            echo "Set the GARUST_REPO Actions variable to enable this job."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git clone --depth 1 --branch "${GARUST_REF}" "${GARUST_REPO}" "${GITHUB_WORKSPACE}/../garust"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Build mp-godot GDExtension
        if: steps.garust.outputs.skip != 'true'
        run: cargo build -p mp-godot --features gdext

      - name: Note when skipped
        if: steps.garust.outputs.skip == 'true'
        run: |
          echo "::notice title=gdext-build skipped::GARUST_REPO not configured; \
          set the GARUST_REPO (and optionally GARUST_REF) Actions variable to build \
          the mp-godot GDExtension in CI."
