<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Capture - A Million Plateaus</title>
</head>
<body>
  <h1>Capture Note</h1>
  <input type="file" id="camera" accept="image/*" capture="environment">
  <p id="status">Waiting for connection...</p>
  <script type="module">
    import { createPeer } from "./src/webrtc.js";
    import { boundImage, MEDIA_BYTE_CAP } from "./src/rich-notes.js";
    import { createPairChannel, pairRoomUrl } from "./src/pair-relay.js";

    const status = document.getElementById("status");
    const camera = document.getElementById("camera");

    // The desktop encodes "<roomId>" or "<roomId>|<relay base>" into the QR hash.
    const [roomId, relayEnc] = location.hash.slice(1).split("|");
    const relayBase = relayEnc ? decodeURIComponent(relayEnc) : "";
    const relayUrl = pairRoomUrl(relayBase, roomId);

    // How this device sends the photo to the desktop. Set by whichever transport
    // is available: the cross-device relay (R-0058) if the QR carried one, else the
    // same-browser WebRTC handshake over BroadcastChannel (two tabs, one machine).
    let sendImage = null;

    if (relayUrl) {
      const chan = createPairChannel({
        url: relayUrl,
        onStatus: (s) => {
          if (s === "online") status.textContent = "Connected. Take a photo.";
          else if (s === "offline") status.textContent = "Relay disconnected — reopen the QR on the desktop.";
          else if (s === "unavailable") status.textContent = "Could not reach the relay.";
        },
      });
      sendImage = (bytes) => chan.send(bytes); // queues until the socket opens
    } else {
      const sig = new BroadcastChannel(`qr-pairing-${roomId}`);
      let peer;
      sig.postMessage({ type: "ready" }); // in case the desktop is already waiting
      sig.onmessage = async (e) => {
        if (e.data.type === "offer") {
          status.textContent = "Connecting...";
          peer = createPeer({ onOpen: () => { status.textContent = "Connected. Take a photo."; } });
          const answer = await peer.acceptOffer(e.data.offer);
          sig.postMessage({ type: "answer", answer });
        }
      };
      sendImage = (bytes) => { if (peer && peer.isOpen()) peer.sendMedia(bytes); };
    }

    camera.addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file || !sendImage) return;
      status.textContent = "Processing image...";

      const img = new Image();
      img.src = URL.createObjectURL(file);
      await new Promise((r) => (img.onload = r));

      const { w, h } = boundImage(img.width, img.height);
      const canvas = document.createElement("canvas");
      canvas.width = w;
      canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);

      let quality = 0.9;
      let blob;
      do {
        blob = await new Promise((r) => canvas.toBlob(r, "image/jpeg", quality));
        quality -= 0.1;
      } while (blob.size > MEDIA_BYTE_CAP && quality > 0.1);

      if (blob.size > MEDIA_BYTE_CAP) {
        status.textContent = "Image too complex/large to send.";
        return;
      }

      status.textContent = "Sending...";
      const buf = await blob.arrayBuffer();
      sendImage(new Uint8Array(buf));
      status.textContent = "Sent!";
    });
  </script>
</body>
</html>
